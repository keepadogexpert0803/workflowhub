spring.application.name=myport

# --- 1. JPA & Hibernate 설정 ---
# JPA가 자동으로 테이블을 건드리지 않게 설정 (none)
spring.jpa.hibernate.ddl-auto=none
# SQL을 로그창에 예쁘게 보여주는 옵션
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- 2. DB 초기화 설정 (★중요: 이게 있어야 schema.sql을 읽습니다) ---
# Spring Boot 2.5 이상부터는 이 옵션이 있어야 서버 켤 때 SQL 파일을 실행합니다.
spring.sql.init.mode=always

# --- 3. H2 Database 설정 ---
# 파일 경로 끝에 DB_CLOSE_ON_EXIT=FALSE를 붙여주면 안정성이 높아집니다.
spring.datasource.url=jdbc:h2:file:C:/Users/NolanYoon/testdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- 4. H2 Console 설정 ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# 콘솔 접속 시 테이블 목록이 바로 보이게 도와주는 옵션
spring.h2.console.settings.trace=false